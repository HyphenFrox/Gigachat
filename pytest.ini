[pytest]
# Project-wide pytest config.
#
# asyncio_mode=auto — our tests freely mix sync and async; auto-mode means
# `async def test_foo` works without a per-test `@pytest.mark.asyncio`
# decorator, matching how the codebase writes async tools.
#
# testpaths — keep collection scoped so `pytest` from the repo root just
# does the right thing.
#
# Markers — three tiers so CI can run a fast check on every push while
# the full suite stays available for local work:
#   smoke   — fast (<30 s wall clock), no external services, no platform
#             deps. This is what the CI workflow runs by default.
#   deep    — may be slow or need Ollama / live HTTP / large fixtures.
#             Run locally or in a nightly job.
#   windows — needs Windows UIA or pyautogui. Auto-skipped on Linux CI.
#
# Any tests not marked fall through to the default collection — we don't
# fail on unmarked tests because it's convenient to add exploratory tests
# without immediately committing to a tier.

asyncio_mode = auto
testpaths = backend/tests
addopts = -q --strict-markers
markers =
    smoke: fast, platform-agnostic, no external services (runs in CI on every push)
    deep: slow or needs Ollama / live HTTP; runs locally or nightly
    windows: requires Windows UIA / pyautogui; auto-skipped elsewhere
